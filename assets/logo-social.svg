<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tempo — social / OG preview card (dark).

  Sized 1280×640 per GitHub's recommended social-preview
  dimensions. Also suitable for the Hex.pm card.

  Layout:

  * The mark + wordmark lockup is horizontally centred on the
    canvas. Total lockup width ≈ 603 (mark 157 + gap 31 +
    wordmark 415); canvas width 1280.

  * The lockup is vertically centred on the canvas, with the
    tagline and subtitle stacked below the wordmark.

  * The mark is top-aligned with the wordmark's cap-top so they
    read as peer elements sharing a baseline at the top.

  * The gap between the mark's visible right edge and the
    wordmark's left edge is tight (≈30 units) so the pair reads
    as one lock-up, not two drifting halves.

  The mark visible extent (accounting for round stroke caps) is
  x=44..201, y=44..212 of its 256-unit box.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1280 640"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1280" height="640" fill="#0b0d10"/>

  <!-- The mark.
       Transform origin positioned so visible left = 339 and
       visible top = 214 (centring the lockup on the canvas). -->
  <g transform="translate(295, 170)"
     fill="none"
     stroke="#e5e7eb"
     stroke-width="24"
     stroke-linecap="round"
     stroke-linejoin="round">
    <path d="M 88 56 H 56 V 200 H 88"/>
    <circle cx="128" cy="128" r="18" fill="#e5e7eb" stroke="none"/>
    <path d="M 168 56 Q 212 128 168 200"/>
  </g>

  <!-- Wordmark: cap-top at y=214 (matches mark's visible top);
       baseline at y=314 for a 140 px font. -->
  <text x="527" y="314"
        font-size="140"
        font-weight="700"
        letter-spacing="-0.02em"
        fill="#e5e7eb">Tempo</text>

  <!-- Tagline. -->
  <text x="529" y="376"
        font-size="30"
        font-weight="500"
        letter-spacing="0.01em"
        fill="#9ca3af">Time as an interval, not an instant.</text>

  <!-- Subtitle. -->
  <text x="529" y="418"
        font-size="22"
        font-weight="400"
        fill="#6b7280">ISO 8601 Parts 1 &amp; 2 · EDTF · IXDTF</text>
</svg>
